version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: gigguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gigguard
      POSTGRES_PASSWORD: gigguard
      POSTGRES_DB: gigguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gigguard_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gigguard:gigguard@postgres:5432/gigguard
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node server.js"

volumes:
  postgres_data:
